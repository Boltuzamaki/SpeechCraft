{% extends "base.html" %}

{% block title %}Access Denied - SpeechToText Pro{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6 text-center">
            <div class="error-page glass-effect p-5 mt-5">
                <i class="fas fa-shield-alt fa-5x text-danger mb-4"></i>
                <h1 class="display-4 text-white mb-3">403</h1>
                <h4 class="text-white mb-3">Access Denied</h4>
                <p class="text-light mb-4">
                    You don't have permission to access this resource. 
                    Please log in or contact support if you believe this is an error.
                </p>
                
                <div class="error-actions">
                    <a href="{{ url_for('main.index') }}" class="btn btn-outline-light">
                        <i class="fas fa-home me-2"></i>Go Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
