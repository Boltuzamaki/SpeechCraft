{% extends "base.html" %}

{% block title %}Forgot Password - SpeechToText Pro{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="auth-card glass-effect p-5 mt-5">
                <div class="text-center mb-4">
                    <i class="fas fa-key fa-3x text-primary mb-3"></i>
                    <h3 class="text-white mb-2">Reset Password</h3>
                    <p class="text-light">Enter your email to receive reset instructions</p>
                </div>

                <!-- Password Reset Form -->
                <form method="POST" class="mb-4">
                    <div class="mb-3">
                        <label for="email" class="form-label text-light">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required 
                               placeholder="Enter your registered email" value="{{ request.form.email or '' }}">
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-paper-plane me-2"></i>Send Reset Instructions
                    </button>
                </form>

                <!-- Links -->
                <div class="auth-links text-center">
                    <div class="mb-2">
                        <a href="{{ url_for('email_auth.login') }}" class="text-light">
                            <i class="fas fa-arrow-left me-1"></i>Back to Login
                        </a>
                    </div>
                    <div>
                        <span class="text-light">Don't have an account? </span>
                        <a href="{{ url_for('email_auth.register') }}" class="text-primary">
                            Sign up here
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.auth-card {
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.auth-links a {
    text-decoration: none;
    transition: all 0.3s ease;
}

.auth-links a:hover {
    color: #007bff !important;
}
</style>
{% endblock %}
